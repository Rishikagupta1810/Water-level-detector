<!-- ═══════════════════════════════════════════════════════════════
     PASTE THIS INSIDE <head> — Toast styles
     ═══════════════════════════════════════════════════════════════ -->
<style>
  /* ── Toast notification ── */
  #toast {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    min-width: 280px;
    max-width: 380px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    animation: slideIn 0.3s ease;
  }
  #toast.error   { background: #fff5f5; border: 1px solid #fecaca; color: #dc2626; }
  #toast.warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
  #toast.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
  #toast .toast-title { font-weight: 700; margin-bottom: 3px; }
  #toast .toast-msg   { opacity: 0.85; }
  @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(110%); opacity: 0; } }
</style>


<!-- ═══════════════════════════════════════════════════════════════
     PASTE THIS INSIDE <body> — Toast element (right after <body>)
     ═══════════════════════════════════════════════════════════════ -->
<div id="toast">
  <div class="toast-title" id="toast-title"></div>
  <div class="toast-msg"   id="toast-msg"></div>
</div>


<!-- ═══════════════════════════════════════════════════════════════

<script>
// ── Toast utility ──
function showToast(title, msg, type = 'error', duration = 4000) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-msg').textContent   = msg;
  toast.className = type;
  toast.style.display = 'block';
  toast.style.animation = 'slideIn 0.3s ease';

  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => { toast.style.display = 'none'; }, 300);
  }, duration);
}
